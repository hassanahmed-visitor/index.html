<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>اللعبة - النظام المتكامل (Leveling & Live AI)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <style>
        :root { --cyan: #00f5ff; --pink: #ff006e; --purple: #8338ec; --yellow: #ffd60a; --bg: #03080f; --card: #0a1628; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        .winner-overlay { position: fixed; inset: 0; background: radial-gradient(circle, rgba(255,0,110,0.85) 0%, rgba(0,0,0,1) 100%); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .winner-name-vfx { font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 40px var(--cyan); transform: skewX(-10deg); animation: slideIn 0.5s ease-out; margin-bottom: 10px; }
        
        .screen { display: none; flex-direction: column; align-items: center; padding: 20px 20px 100px; width: 100%; }
        .screen.active { display: flex; }
        .card { width: 100%; max-width: 500px; background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-cyan { background: var(--cyan); color: #000; }
        .btn-pink { background: var(--pink); color: #fff; }
        .btn-purple { background: var(--purple); color: #fff; }

        input[type="text"] { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 2px solid var(--cyan); border-radius: 10px; color: #fff; margin-bottom: 10px; font-family: inherit; font-size: 16px; outline: none; }
        
        /* كاميرا التتبع اللايف */
        #liveCamera { width: 100%; border-radius: 15px; border: 3px solid var(--purple); margin-top: 15px; display: none; transform: scaleX(-1); }
        #motionBar { width: 100%; height: 20px; background: #333; border-radius: 10px; margin-top: 10px; overflow: hidden; display: none; }
        #motionFill { height: 100%; width: 0%; background: var(--green); transition: width 0.2s; }
        
        /* نافذة تحديد اللاعب */
        #whoIsPlaying { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2500; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #060d18; display: none; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { color: rgba(255,255,255,0.3); font-size: 14px; font-weight: 900; cursor: pointer; }
        .nav-item.active { color: var(--cyan); }

        @keyframes slideIn { from { transform: translateX(120%) skewX(-15deg); opacity: 0; } to { transform: translateX(0) skewX(-10deg); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="winnerAudio" src="https://ia800108.us.archive.org/15/items/win_202102/winner.mp3" preload="auto"></audio>
    <audio id="notifAudio" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

    <div class="winner-overlay" id="winnerOverlay">
        <div style="font-size:22px; color:var(--cyan); letter-spacing:4px">LADIES AND GENTLEMEN...</div>
        <div style="font-size:35px; font-weight:900">WE HAVE A WINNER!</div>
        <div class="winner-name-vfx" id="winnerNameDisplay">HASSAN</div>
        <div id="prizeResult" style="color:var(--yellow); font-size:22px; font-weight:900; margin-top:15px;"></div>
        <button class="btn btn-cyan" style="width:200px; margin-top:30px" onclick="nextLevel()">التالي ⏭️</button>
    </div>

    <div id="whoIsPlaying">
        <div class="card" style="background: var(--pink);">
            <h2 style="color: #fff; margin-bottom: 15px;">رصدنا شخص قدام الكاميرا! 📸</h2>
            <p style="margin-bottom: 15px;">مين اللي هينفذ التحدي دلوقتي؟</p>
            <input type="text" id="currentPlayerName" placeholder="اكتب اسم اللاعب الحالي...">
            <button class="btn btn-cyan" onclick="confirmPlayer()">أنا جاهز للتنفيذ!</button>
        </div>
    </div>

    <div id="sHome" class="screen active">
        <h1 style="font-size:80px; color:var(--cyan); margin-top:60px; font-weight:900;">اللعبة</h1>
        <div class="card">
            <input type="text" id="nameInput" placeholder="اكتب اسمك الأساسي...">
            <button class="btn btn-cyan" onclick="enterHome()">🎮 دخول النظام</button>
        </div>
    </div>

    <div id="sDaily" class="screen">
        <div style="display:flex; justify-content:space-between; width:100%; max-width:500px; margin-bottom:10px;">
            <h2 style="color:var(--cyan)">التحدي الحالي</h2>
            <h2 style="color:var(--yellow)">مستوى: <span id="levelDisplay">1</span></h2>
        </div>
        <div class="card">
            <p id="dailyTaskText" style="font-size:24px; font-weight:900; margin:10px 0; line-height:1.5">جاري تحميل المستوى...</p>
            <p id="prizeTag" style="color:var(--pink); font-weight:bold; margin-bottom: 15px;"></p>
            
            <video id="liveCamera" autoplay muted playsinline></video>
            <canvas id="motionCanvas" style="display:none;"></canvas>
            
            <div id="motionBar"><div id="motionFill"></div></div>
            <p id="aiFeedback" style="color:var(--cyan); font-weight:bold; margin-top:10px; display:none;">🤖 الـ AI يراقب حركتك...</p>

            <button id="startChallengeBtn" class="btn btn-purple" onclick="startLiveChallenge()">🔥 ابدأ تنفيذ التحدي</button>
        </div>
    </div>

    <div id="sLeaderboard" class="screen">
        <h2 style="color:var(--yellow); margin-bottom:15px">🏆 لوحة الشرف</h2>
        <div class="card" id="leaderboardList">
            <p>جاري تحميل الأبطال...</p>
        </div>
    </div>

    <div class="bottom-nav" id="mainNav">
        <div class="nav-item active" onclick="tab(0)">المستويات</div>
        <div class="nav-item" onclick="tab(1)">لوحة الشرف</div>
    </div>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyC4OKYd0wLOY_G-Vjs0oBa2d1TgFO8BHl8",
            databaseURL: "https://myfootballapp-38010-default-rtdb.firebaseio.com",
            projectId: "myfootballapp-38010",
        });
        const db = firebase.database();
        let mainUser = '', activePlayer = '', currentLevel = 1;
        let motionInterval = null, videoStream = null;

        // محرك توليد المستويات الصعبة المتصاعدة (50 ألف مستوى)
        function getLevelData(level) {
            const difficulties = ["قف على قدم واحدة", "اركض في مكانك", "اعمل ضغط", "اقفز بشكل متواصل", "حرك ذراعيك بقوة"];
            const modifiers = ["مغمض العينين", "وأنت تغني", "بسرعة جنونية", "بدون توقف نهائيا", "وأنت تعد للخلف"];
            const baseTask = difficulties[level % difficulties.length];
            const modTask = modifiers[Math.floor((level / 5)) % modifiers.length] || modifiers[0];
            
            return {
                text: `مهمة ${level}: ${baseTask} ${modTask} لمدة 10 ثواني أمام الكاميرا!`,
                prize: `جائزة مستوى ${level}: ${Math.floor(Math.random()*150)} جنيه رصيد`,
                duration: 10 // ثواني للتنفيذ
            };
        }

        async function enterHome() {
            mainUser = document.getElementById('nameInput').value.trim();
            if(!mainUser) return;
            
            // تصاريح إجبارية
            const wAudio = document.getElementById('winnerAudio');
            const nAudio = document.getElementById('notifAudio');
            wAudio.play().then(()=> wAudio.pause()).catch(()=>{});
            nAudio.play().then(()=> nAudio.pause()).catch(()=>{});
            if ("Notification" in window) await Notification.requestPermission();

            document.getElementById('mainNav').style.display = 'flex';
            
            // تحميل مستوى اللاعب من الداتا بيز
            db.ref('game/players/' + mainUser).once('value', snap => {
                if(snap.exists()) currentLevel = snap.val().level || 1;
                loadLevel(currentLevel);
            });
            
            tab(0);
            updateLeaderboard();
        }

        function loadLevel(lvl) {
            const data = getLevelData(lvl);
            document.getElementById('levelDisplay').textContent = lvl;
            document.getElementById('dailyTaskText').textContent = data.text;
            document.getElementById('prizeTag').textContent = data.prize;
            document.getElementById('startChallengeBtn').style.display = 'block';
            document.getElementById('liveCamera').style.display = 'none';
            document.getElementById('motionBar').style.display = 'none';
            document.getElementById('aiFeedback').style.display = 'none';
        }

        // --- نظام الكاميرا والتتبع اللايف ---
        async function startLiveChallenge() {
            document.getElementById('startChallengeBtn').style.display = 'none';
            const video = document.getElementById('liveCamera');
            video.style.display = 'block';
            
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = videoStream;
                
                // أول ما الكاميرا تفتح، نوقف اللعبة ونسأل: مين اللي هيلعب؟
                setTimeout(() => {
                    document.getElementById('whoIsPlaying').style.display = 'flex';
                }, 1500);

            } catch (err) { alert("لازم توافق على الكاميرا عشان تنفذ التحدي!"); }
        }

        function confirmPlayer() {
            activePlayer = document.getElementById('currentPlayerName').value.trim() || mainUser;
            document.getElementById('whoIsPlaying').style.display = 'none';
            document.getElementById('motionBar').style.display = 'block';
            document.getElementById('aiFeedback').style.display = 'block';
            startMotionDetection();
        }

        // محرك تتبع الحركة بكسل بكسل (بديل الـ AI التقيل)
        function startMotionDetection() {
            const video = document.getElementById('liveCamera');
            const canvas = document.getElementById('motionCanvas');
            const ctx = canvas.getContext('2d');
            let lastImageData = null;
            let timeElapsed = 0;
            const requiredTime = 100; // 10 ثواني (كل 100ms)

            motionInterval = setInterval(() => {
                canvas.width = video.videoWidth / 4; // تصغير للسرعة
                canvas.height = video.videoHeight / 4;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                if (lastImageData) {
                    let motionScore = 0;
                    for (let i = 0; i < currentData.data.length; i += 4) {
                        const diff = Math.abs(currentData.data[i] - lastImageData.data[i]);
                        if (diff > 30) motionScore++; // لو في تغيير في البيكسل
                    }
                    
                    // لو في حركة قوية
                    if (motionScore > 100) {
                        timeElapsed++;
                        document.getElementById('motionFill').style.width = (timeElapsed) + '%';
                        document.getElementById('aiFeedback').textContent = "🤖 ممتاز! استمر في الحركة...";
                        document.getElementById('aiFeedback').style.color = "var(--green)";
                        
                        if (timeElapsed >= requiredTime) {
                            clearInterval(motionInterval);
                            challengeSuccess();
                        }
                    } else {
                        // لو وقف
                        timeElapsed = Math.max(0, timeElapsed - 2); 
                        document.getElementById('motionFill').style.width = timeElapsed + '%';
                        document.getElementById('aiFeedback').textContent = "⚠️ الـ AI: إنت وقفت ليه؟! حركتك ضعيفة!";
                        document.getElementById('aiFeedback').style.color = "var(--pink)";
                    }
                }
                lastImageData = currentData;
            }, 100);
        }

        function challengeSuccess() {
            if(videoStream) videoStream.getTracks().forEach(track => track.stop());
            const data = getLevelData(currentLevel);
            
            // تسجيل الفوز
            db.ref('game/players/' + activePlayer).set({ level: currentLevel + 1, ts: Date.now() });
            
            document.getElementById('winnerOverlay').style.display = 'flex';
            document.getElementById('winnerNameDisplay').textContent = activePlayer.toUpperCase();
            document.getElementById('prizeResult').textContent = data.prize;
            document.getElementById('winnerAudio').play();
            
            // إرسال إشعار للكل إن في بطل كسب
            db.ref('game/globalFeed').set({ msg: `${activePlayer} اجتاز المستوى ${currentLevel}!`, ts: Date.now() });
        }

        function nextLevel() {
            document.getElementById('winnerOverlay').style.display = 'none';
            currentLevel++;
            loadLevel(currentLevel);
        }

        function updateLeaderboard() {
            db.ref('game/players').orderByChild('level').on('value', snap => {
                if(snap.exists()) {
                    let html = '';
                    let arr = [];
                    snap.forEach(child => { arr.push({name: child.key, level: child.val().level}); });
                    arr.reverse(); // من الأكبر للأصغر
                    arr.forEach((p, index) => {
                        html += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #333; padding:10px 0;">
                            <span>${index===0?'👑 ':''}${p.name}</span>
                            <span style="color:var(--cyan)">مستوى ${p.level}</span>
                        </div>`;
                    });
                    document.getElementById('leaderboardList').innerHTML = html;
                }
            });
        }

        function tab(n) { showS(n===0 ? 'sDaily' : 'sLeaderboard'); document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active', i===n)); }
        function showS(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
