<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>اللعبة - THE WINNER</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{--cyan:#00f5ff;--pink:#ff006e;--gold:#ffd60a;--bg:#03080f;}
body{background:var(--bg);font-family:'Cairo',sans-serif;margin:0;overflow:hidden;color:#fff;}

/* شاشة الفائز الاحترافية (Template) */
.winner-overlay {
    position: fixed; inset: 0; background: radial-gradient(circle, rgba(255,0,110,0.4) 0%, rgba(3,8,15,1) 100%);
    z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden; animation: bgPulse 2s infinite;
}

/* حركة الخلفية */
@keyframes bgPulse { 0%,100%{background-color:#03080f;} 50%{background-color:#1a0510;} }

/* تصميم الاسم المتحرك (HASSAN) */
.winner-name-vfx {
    font-size: 10vw; font-weight: 900; color: #fff; text-transform: uppercase;
    text-shadow: 0 0 20px var(--pink), 0 0 40px var(--pink);
    letter-spacing: 15px; z-index: 10; transform: skewX(-10deg);
    animation: slideIn 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
}

/* صورة الفائز بتأثير AI */
.winner-avatar-frame {
    width: 250px; height: 250px; border: 5px solid var(--cyan); border-radius: 20px;
    margin-bottom: 20px; overflow: hidden; position: relative;
    box-shadow: 0 0 50px var(--cyan); transform: rotate(-3deg);
}
.winner-avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

/* العملات الذهبية المتطايرة */
.coin {
    position: absolute; width: 60px; height: 60px; background: var(--gold);
    border-radius: 50%; border: 4px solid #b8860b;
    box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5);
    z-index: 5; animation: coinFall 3s linear infinite;
}

@keyframes coinFall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@keyframes slideIn { from { transform: translateX(100%) skewX(-10deg); opacity: 0; } to { transform: translateX(0) skewX(-10deg); opacity: 1; } }

/* لوحة التحكم البسيطة */
.ctrl-card { position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; z-index: 1001; }
</style>
</head>
<body>

<div class="winner-overlay" id="winnerOverlay">
    <div style="font-size: 24px; color: var(--cyan); margin-bottom: 10px;">LADIES AND GENTLEMEN...</div>
    <div style="font-size: 32px; margin-bottom: 30px;">WE HAVE A WINNER!</div>
    
    <div class="winner-avatar-frame">
        <img id="winnerImg" src="https://via.placeholder.com/250" alt="Winner Avatar">
    </div>
    
    <div class="winner-name-vfx" id="winnerNameDisplay">HASSAN</div>
    
    <button onclick="closeWinner()" style="margin-top: 50px; padding: 10px 30px; background: var(--pink); border: none; color: #fff; border-radius: 5px; cursor: pointer;">إغلاق</button>
</div>

<div class="ctrl-card" id="ctrlPanel" style="display:none">
    <input type="text" id="wName" placeholder="اسم الفائز">
    <input type="text" id="wImg" placeholder="رابط صورة الفائز">
    <button onclick="publishWinner()">🏆 إعلان الفوز</button>
</div>

<script>
// إعدادات Firebase
firebase.initializeApp({
  apiKey: "AIzaSyC4OKYd0wLOY_G-Vjs0oBa2d1TgFO8BHl8",
  databaseURL: "https://myfootballapp-38010-default-rtdb.firebaseio.com",
  projectId: "myfootballapp-38010",
});
const db = firebase.database();

// الصوت الأصلي للمسلسل (مرفوع على رابط خارجي ثابت)
const winnerAudio = new Audio('https://ia800108.us.archive.org/15/items/win_202102/winner.mp3');

// تفعيل لوحة التحكم بالكود السري
if(window.location.search.includes('admin=htpsl')) {
    document.getElementById('ctrlPanel').style.display = 'block';
}

function publishWinner() {
    const name = document.getElementById('wName').value || "HASSAN";
    const img = document.getElementById('wImg').value || "https://api.dicebear.com/7.x/avataaars/svg?seed=" + name;
    db.ref('elleba/winner').set({ name: name.toUpperCase(), img: img, ts: Date.now() });
}

// استقبال الفوز عند الكل (المزامنة)
db.ref('elleba/winner').on('value', snap => {
    if(snap.exists()){
        const data = snap.val();
        document.getElementById('winnerOverlay').style.display = 'flex';
        document.getElementById('winnerNameDisplay').textContent = data.name;
        document.getElementById('winnerImg').src = data.img;
        
        // تشغيل صوت المسلسل
        winnerAudio.play();
        
        // توليد عملات ذهبية
        createCoins();
    }
});

function createCoins() {
    for(let i=0; i<30; i++) {
        let coin = document.createElement('div');
        coin.className = 'coin';
        coin.style.left = Math.random() * 100 + 'vw';
        coin.style.animationDelay = Math.random() * 2 + 's';
        document.getElementById('winnerOverlay').appendChild(coin);
        setTimeout(() => coin.remove(), 3000);
    }
}

function closeWinner() { document.getElementById('winnerOverlay').style.display = 'none'; }

// لازم اللاعب يدوس أي حتة عشان الصوت يتفعل (قانون المتصفح)
document.body.addEventListener('click', () => {
    winnerAudio.play().then(() => { winnerAudio.pause(); winnerAudio.currentTime = 0; });
}, {once: true});

</script>
</body>
</html>
