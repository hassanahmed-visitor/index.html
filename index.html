<!-- استبدل الكود القديم بهذا الكود بالكامل -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#03080f">
<title>اللعبة - نسخة جيتسي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
/* نفس التنسيقات السابقة بدون تغيير لضمان الشكل الجمالي */
:root{--cyan:#00f5ff;--pink:#ff006e;--purple:#8338ec;--green:#06d6a0;--yellow:#ffd60a;--orange:#fb5607;--bg:#03080f;--card:#0a1628;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Cairo',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden;direction:rtl;}
/* ... باقي الـ CSS المذهل بتاعك ... */
.screen{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;align-items:center;padding:0 0 80px;}
.screen.active{display:flex;}
.card{width:100%;max-width:460px;background:var(--card);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,.08);margin-bottom:12px;}
input{width:100%;padding:14px 16px;background:rgba(0,245,255,0.04);border:1.5px solid rgba(0,245,255,0.2);border-radius:10px;color:#fff;text-align:right;}
.btn{width:100%;padding:15px;border-radius:12px;border:none;font-weight:700;cursor:pointer;}
.btn-cyan{background:var(--cyan);color:#000;}
#videoCallFrame, #ctrlVideoFrame{width:100%;height:60vh;border-radius:16px;border:2px solid var(--cyan);margin-top:10px;}
</style>
</head>
<body>

<!-- ... الهيكل التنظيمي (السكاشن) ... -->
<div class="screen active" id="sHome">
  <h1 style="color:var(--cyan);text-align:center;margin-top:50px">اللعبة</h1>
  <div class="card">
    <input type="text" id="nameInput" placeholder="اكتب اسمك..." oninput="checkSecretCode(this.value)">
    <button class="btn btn-cyan" onclick="enterHome()" style="margin-top:10px">🎮 دخول</button>
  </div>
</div>

<div class="screen" id="sReal">
  <div id="inGamePanel" style="display:none; width:90%">
    <iframe id="videoCallFrame" allow="camera;microphone;fullscreen;display-capture"></iframe>
  </div>
  <button id="joinBtn" class="btn btn-cyan" onclick="joinRealChallenge()">انضم للتحدي</button>
</div>

<div class="screen" id="sController">
  <h2 style="color:var(--purple)">لوحة التحكم 👑</h2>
  <iframe id="ctrlVideoFrame" allow="camera;microphone;fullscreen;display-capture"></iframe>
</div>

<script>
// إعدادات Firebase (اتأكد إنها صحيحة)
firebase.initializeApp({
  apiKey:"AIzaSyC4OKYd0wLOY_G-Vjs0oBa2d1TgFO8BHl8",
  authDomain:"myfootballapp-38010.firebaseapp.com",
  databaseURL:"https://myfootballapp-38010-default-rtdb.firebaseio.com",
  projectId:"myfootballapp-38010",
  storageBucket:"myfootballapp-38010.firebasestorage.app",
  appId:"1:240430350266:web:5a6b766e8f1f001479a783"
});
const db = firebase.database();

let myName='', myId='', isController=false;

// --- وظيفة Jitsi الجديدة ---
function createJitsiRoom(roomName){
  // بنعمل اسم غرفة نظيف ومميز
  const clean = roomName.replace(/[^a-zA-Z0-9]/g,'').substring(0,30);
  return 'https://meet.jit.si/ElLeba-' + clean;
}

function checkSecretCode(val){
  if(val.trim().toLowerCase()==='htpsl') {
      isController = true;
      showScreen('sController');
      startController();
  }
}

function enterHome(){
    myName = document.getElementById('nameInput').value;
    myId = 'p' + Date.now();
    showScreen('sReal');
    listenForEvents();
}

function startController(){
    const roomUrl = createJitsiRoom('ctrl' + Date.now());
    // إضافة إعدادات Jitsi للرابط
    document.getElementById('ctrlVideoFrame').src = roomUrl + '#userInfo.displayName=%22المتحكم👑%22&config.startWithVideoMuted=false';
    db.ref('elleba/gameRoom').set(roomUrl);
}

function joinRealChallenge(){
    db.ref('elleba/queue/' + myId).set({name: myName});
    alert("تم إرسال طلبك للمتحكم!");
}

function listenForEvents(){
    db.ref('elleba/playerEvents/' + myId).on('value', snap => {
        if(snap.exists() && snap.val().event === 'accepted'){
            const roomUrl = snap.val().roomUrl;
            document.getElementById('inGamePanel').style.display = 'block';
            document.getElementById('joinBtn').style.display = 'none';
            document.getElementById('videoCallFrame').src = roomUrl + '#userInfo.displayName=' + encodeURIComponent(myName);
        }
    });
}

function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
